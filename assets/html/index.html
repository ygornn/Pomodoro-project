<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <link rel="stylesheet" href="../css/index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        
    </head>
    <body>
        <div class="grid grid-cols-4 gap-5 h-screen">
            <div class="col-span-3">
                <div class="flex items-center justify-center w-screen h-screen">
                <form action="" method="post" id="form" class="">
                    <div id="timer" class="flex font-bold text-white text-[10vh] sm:text-[12vh] md:text-[15vh]">
                        <input type="text" name="time_val" value="25:00" class="w-[25vh] sm:w-[32vh] md:w-[40vh] h-[10vh] sm:h-[12vh] md:h-[15vh] text-center ">
                    </div>
                    <div class="flex text-white mb-10 md:mb-20 justify-center">
                        <p class="text-xs sm:text-sm md:text-base">Programming</p>
                    </div>
                    <div class="flex gap-6 sm:gap-8 md:gap-10 justify-center">
                        <button class="controls">
                            <img src="../images/music-music-player-player-2-svgrepo-com.svg" alt="">
                        </button>
                        <button type="submit" id="play" class="controls">
                            <img src="../images/music-play-play-button-svgrepo-com.svg" alt="">
                        </button>
                        <button class="controls">
                            <img src="../images/music-next-next-button-svgrepo-com.svg" alt="">
                        </button>
                    </div>
                </form>
                </div>
            </div>
            <div class="flex justify-center my-40 mr-8 bg-black rounded-[3.6vh]">
                <div class="grid grid-rows-11 w-full">
                    <div class="flex row-span-10 shrink-0">
                        
                        <form action="form.html" method="post" class="w-full h-full">
                            <p class="flex justify-center text-white text-[3vh] font-bold my-4">TAREFAS</p>
                            <div class="checkbox_div">
                                <input type="checkbox" class="checkbox mr-3" name="1" id="1">
                                <label id="checkbox">Programming</label>
                            </div>
                            <div class="checkbox_div">
                                <input type="checkbox" class="checkbox mr-3" name="1" id="1">
                                <label id="checkbox">Programming</label>
                            </div>
                            <div class="checkbox_div">
                                <input type="checkbox" class="checkbox mr-3" name="1" id="1">
                                <label id="checkbox">Programming</label>
                            </div>
                            <div class="checkbox_div">
                                <input type="checkbox" class="checkbox mr-3" name="1" id="1">
                                <label id="checkbox">Programming</label>
                            </div>
                            <div class="checkbox_div">
                                <input type="checkbox" class="checkbox mr-3" name="1" id="1">
                                <label id="checkbox">Programming</label>
                            </div>
                    </div>
                            
                    <div class="flex justify-end items-center h-10 ">
                        <button type="submit" class="size-15 mr-8 mb-8 bg-white text-black text-[3vh] rounded-[3vh] hover:bg-gray-200" id="add_task">+</button>
                    </div>
                </form>
                </div>
            </div>
        </div> 
        <script src="../js/scripts.js"></script>
</body>
</html>
