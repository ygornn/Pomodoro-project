<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <link rel="stylesheet" href="../css/index.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        
    </head>
    <body>
        <div class="grid grid-cols-4 gap-5 h-screen">
            <div class="col-span-3">
                <div class="flex items-center justify-center w-screen h-screen">
                <form action="" method="post" id="form" class="">
                    <div id="timer" class="flex font-bold text-white text-[10vh] sm:text-[12vh] md:text-[15vh]">
                        <input type="text" name="time_val" value="25:00" class="w-[25vh] sm:w-[32vh] md:w-[40vh] h-[10vh] sm:h-[12vh] md:h-[15vh] text-center ">
                    </div>
                    <div class="flex font-mono text-white mb-10 md:mb-20 justify-center">
                        <p class="text-xs sm:text-sm md:text-base">Programming</p>
                    </div>
                    <div class="flex gap-6 sm:gap-8 md:gap-10 justify-center">
                        <button class="controls">
                            <img src="../images/music-music-player-player-2-svgrepo-com.svg" alt="">
                        </button>
                        <button type="submit" id="play" class="controls">
                            <img src="../images/music-play-play-button-svgrepo-com.svg" alt="">
                        </button>
                        <button class="controls">
                            <img src="../images/music-next-next-button-svgrepo-com.svg" alt="">
                        </button>
                    </div>
                </form>
                </div>
            </div>
            <div class="flex justify-center my-40 mr-8 bg-black/20 rounded-[2.6vh]">
                <form action="" method="post" class="w-full h-full">
                    <p class="flex justify-center text-white text-[3vh] font-bold my-4">TAREFAS</p>
                    <label id="checkbox">
                        <input type="checkbox" class="checkbox" name="1" id="1">
                        Programming
                    </label>
                </form>
        </div> 
        <script src="../js/scripts.js"></script>
</body>
</html>
