<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <link rel="stylesheet" href="../css/index.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        
    </head>
    <body>
        <div class="flex flex-col justify-center items-center h-screen">
            <form action="" method="post" id="form">
                <div id="timer" class="flex font-bold text-white justify-center text-[15vh]">
                    <input type="text" name="time_val" value="25:00" class="w-[40vh] h-[15vh] text-center ">
                </div>
                <div class="flex  font-mono text-white mb-20 justify-center">
                    <p>Programming</p>
                </div>
                <div class="flex gap-10 justify-center">
                    <button class="controls">
                        <img src="../css/music-music-player-player-2-svgrepo-com.svg" alt="">
                    </button>
                    <button type="submit" id="play" class="controls">
                        <img src="../css/music-play-play-button-svgrepo-com.svg" alt="">
                    </button>
                    <button class="controls">
                        <img src="../css/music-next-next-button-svgrepo-com.svg" alt="">
                    </button>
                </div>
            </form>
        </div>    
        <script src="../js/scripts.js"></script>
</body>
</html>
